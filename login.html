<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Farmagitechs Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>

*{
    font-family:'Segoe UI',sans-serif;
}

body{

    margin:0;
    height:100vh;

    background:linear-gradient(135deg,#1d4ed8,#2563eb,#3b82f6);

    display:flex;
    justify-content:center;
    align-items:center;

}

.login-card{

    width:430px;

    background:#fff;

    border-radius:18px;

    padding:40px;

    box-shadow:0 20px 45px rgba(0,0,0,.25);

    animation:fade .6s;

}

.logo{

    width:90px;
    height:90px;

    border-radius:50%;

    background:#e8f0ff;

    display:flex;
    justify-content:center;
    align-items:center;

    margin:auto;

    margin-bottom:20px;

}

.logo i{

    font-size:45px;
    color:#2563eb;

}

h2{

    text-align:center;
    font-weight:bold;

}

.subtitle{

    text-align:center;
    color:#777;

    margin-bottom:30px;

}

.form-control{

    height:50px;
    border-radius:10px;

}

.input-group-text{

    border-radius:10px 0 0 10px;

}

.btn-login{

    height:50px;

    border-radius:10px;

    font-size:17px;

    font-weight:600;

    background:#2563eb;

    border:none;

}

.btn-login:hover{

    background:#1e40af;

}

.footer{

    margin-top:25px;

    text-align:center;

    font-size:13px;

    color:#888;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">

<i class="bi bi-hospital-fill"></i>

</div>

<h2>Farmagitechs</h2>

<p class="subtitle">

Request Management System

</p>

<form id="loginForm">

<div class="mb-3">

<label class="form-label">

Username

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>

<input

type="text"

id="username"

class="form-control"

placeholder="Masukkan Username"

required>

</div>

</div>

<div class="mb-4">

<label class="form-label">

Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>

<input

type="password"

id="password"

class="form-control"

placeholder="Masukkan Password"

required>

</div>

</div>

<button

class="btn btn-primary btn-login w-100"

type="submit">

<i class="bi bi-box-arrow-in-right"></i>

Login

</button>

</form>

<div class="footer">

© 2026 Farmagitechs

</div>

</div>

<script>

const BASE_URL="http://192.168.0.199:9006";

document.getElementById("loginForm").addEventListener("submit",async function(e){

e.preventDefault();

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

try{

const response=await fetch(BASE_URL+"/api/keycloak_auth/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

username:username,

password:password

})

});

const result=await response.json();

if(response.ok){

localStorage.setItem("access_token",result.data.token.access_token);

alert("Login berhasil");

window.location.href="index.html";

}else{

alert(result.message);

}

}catch(error){

alert("Server tidak dapat dihubungi");

}

});

</script>

</body>
</html>
