<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmagitechs - Request</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans text-gray-700 min-h-screen flex flex-col">

    <header class="bg-[#1e5bc6] text-white px-6 py-3 flex justify-between items-center shadow-md">
        <div class="text-lg font-bold tracking-wide">Farmagitechs — Request</div>
        <button class="bg-gray-600/30 hover:bg-gray-600/50 text-sm px-4 py-1.5 rounded transition">Logout</button>
    </header>

    <main class="flex-1 p-6 max-w-[1400px] w-full mx-auto">
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-xl font-bold text-gray-800">List Request</h1>
                <button onclick="openModalAdd()" class="bg-[#1e5bc6] hover:bg-blue-700 text-white font-medium px-4 py-2 rounded text-sm flex items-center gap-1 transition">
                    <span>+</span> Tambah Request
                </button>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-4 gap-4 items-end mb-6 bg-gray-50 p-4 rounded-lg border border-gray-100">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Start Date</label>
                    <input type="date" id="filterStartDate" class="w-full border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">End Date</label>
                    <input type="date" id="filterEndDate" class="w-full border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Product</label>
                    <select id="filterProduct" class="w-full border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500 bg-white">
                        <option value="Semua Product">Semua Product</option>
                        <option value="E-Doc">E-Doc</option>
                        <option value="SIMRS">SIMRS</option>
                        <option value="Evoluz">Evoluz</option>
                        <option value="Pendaftaran Online">Pendaftaran Online</option>
                        <option value="Asuhan Keperawatan">Asuhan Keperawatan</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button onclick="applyFilter()" class="bg-[#1e5bc6] hover:bg-blue-700 text-white px-4 py-1.5 rounded text-sm font-medium transition flex-1">Filter</button>
                    <button onclick="resetFilter()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-1.5 rounded text-sm font-medium transition flex-1">Reset</button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider border-b border-gray-200">
                            <th class="py-3 px-4 font-semibold w-12 text-center">No</th>
                            <th class="py-3 px-4 font-semibold">Title</th>
                            <th class="py-3 px-4 font-semibold">Hospital Name</th>
                            <th class="py-3 px-4 font-semibold">Product</th>
                            <th class="py-3 px-4 font-semibold w-24 text-center">Status</th>
                            <th class="py-3 px-4 font-semibold w-32">Request Time</th>
                            <th class="py-3 px-4 font-semibold w-32 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="formModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex justify-center items-center p-4 z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full flex flex-col overflow-hidden animate-fade-in">
            <div class="flex justify-between items-center p-4 border-b border-gray-100">
                <h2 id="modalTitle" class="text-base font-bold text-gray-800">Tambah Request</h2>
                <button onclick="closeFormModal()" class="text-gray-400 hover:text-gray-600 text-lg font-semibold">&times;</button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="requestId">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Product <span class="text-red-500">*</span></label>
                    <select id="inputProduct" class="w-full border border-gray-300 rounded px-3 py-2 text-sm bg-white focus:outline-none focus:border-blue-500">
                        <option value="">-- Pilih Product --</option>
                        <option value="SIMRS">SIMRS</option>
                        <option value="E-Doc">E-Doc</option>
                        <option value="Pendaftaran Online">Pendaftaran Online</option>
                        <option value="Asuhan Keperawatan">Asuhan Keperawatan</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Title <span class="text-red-500">*</span></label>
                    <input type="text" id="inputTitle" placeholder="Masukkan judul request" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Content <span class="text-red-500">*</span></label>
                    <textarea id="inputContent" class="w-full border border-gray-300 rounded p-3 min-h-[120px] text-sm focus:outline-none focus:border-blue-500" placeholder="Ketik isi content di sini..."></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-gray-100 flex justify-end gap-2 bg-gray-50">
                <button onclick="closeFormModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-medium px-4 py-1.5 rounded transition">Batal</button>
                <button onclick="saveRequest()" class="bg-[#1e5bc6] hover:bg-blue-700 text-white text-sm font-medium px-4 py-1.5 rounded shadow-sm transition">Simpan</button>
            </div>
        </div>
    </div>

    <div id="detailModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex justify-center items-center p-4 z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full flex flex-col overflow-hidden">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50">
                <h2 class="text-base font-bold text-gray-800">Detail Request</h2>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600 text-lg font-semibold">&times;</button>
            </div>
            <div class="p-6 space-y-3 text-sm">
                <div><span class="font-semibold text-gray-500 block text-xs">JUDUL:</span> <span id="detailTitle" class="text-gray-800 font-medium text-base"></span></div>
                <div><span class="font-semibold text-gray-500 block text-xs">PRODUK:</span> <span id="detailProduct" class="bg-blue-50 text-blue-700 px-2 py-0.5 rounded text-xs"></span></div>
                <div><span class="font-semibold text-gray-500 block text-xs">RUMAH SAKIT:</span> <span id="detailHospital" class="text-gray-700"></span></div>
                <div><span class="font-semibold text-gray-500 block text-xs">STATUS:</span> <span id="detailStatus"></span></div>
                <div><span class="font-semibold text-gray-500 block text-xs">WAKTU REQUEST:</span> <span id="detailTime" class="text-gray-600"></span></div>
                <hr class="border-gray-100 my-2">
                <div><span class="font-semibold text-gray-500 block text-xs mb-1">KONTEN / DESKRIPSI:</span> <div id="detailContent" class="bg-gray-50 p-3 rounded border border-gray-200 text-gray-600 max-h-40 overflow-y-auto"></div></div>
            </div>
            <div class="p-4 border-t border-gray-100 flex justify-end bg-gray-50">
                <button onclick="closeDetailModal()" class="bg-[#1e5bc6] hover:bg-blue-700 text-white text-sm font-medium px-5 py-1.5 rounded transition">Tutup</button>
            </div>
        </div>
    </div>


    <script>
        // MASTER DATA RAW (Disamakan dengan screenshot anda)
        let requestsData = [
            { id: 1, title: "TESTING", hospital: "Farmagitechs", product: "SIMRS", status: "Waiting", time: "2026-06-30", content: "Melakukan pengujian fitur sistem baru." },
            { id: 2, title: "Test Done123", hospital: "Farmagitechs", product: "E-Doc", status: "Waiting", time: "2026-06-30", content: "Dokumen testing integrasi API." },
            { id: 3, title: "Judul request", hospital: "Farmagitechs", product: "E-Doc", status: "Waiting", time: "2026-06-30", content: "Permintaan penyesuaian cetakan berkas rekam medis." },
            { id: 4, title: "Judul request1245", hospital: "Farmagitechs", product: "E-Doc", status: "Waiting", time: "2026-06-29", content: "Revisi layout komponen dashboard verifikator." },
            { id: 5, title: "Antrian Pasien Online", hospital: "RSGM Soelastri", product: "Pendaftaran Online", status: "Waiting", time: "2026-03-09", content: "Sinkronisasi modul antrean dengan sistem pusat." },
            { id: 6, title: "Satusehat Update Encounter ( Regulasi 2026 )", hospital: "Farmagitechs", product: "SIMRS", status: "Accepted", time: "2026-01-30", content: "Pembaruan struktur payload JSON klaim SatuSehat Kemenkes." },
            { id: 7, title: "Pembuatan Update Data Pengkajian", hospital: "Farmagitechs", product: "Asuhan Keperawatan", status: "Accepted", time: "2026-01-30", content: "Penambahan form pengkajian awal keperawatan anak." }
        ];

        let filteredData = [...requestsData];

        // RENDER TABEL UTAMA
        function renderTable(dataToRender) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (dataToRender.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-8 text-gray-400 bg-gray-50/50">Data tidak ditemukan. Silakan sesuaikan filter.</td></tr>`;
                return;
            }

            dataToRender.forEach((item, index) => {
                // Formatting tanggal yyyy-mm-dd ke d/m/yyyy untuk UI
                const dateParts = item.time.split('-');
                const formattedDate = `${parseInt(dateParts[2])}/${parseInt(dateParts[1])}/${dateParts[0]}`;

                const statusClass = item.status === 'Accepted' 
                    ? 'bg-green-100 text-green-600' 
                    : 'bg-orange-100 text-orange-600';

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50/80 transition">
                        <td class="py-3 px-4 text-center text-gray-400 font-medium">${index + 1}</td>
                        <td class="py-3 px-4 font-medium text-gray-800">${item.title}</td>
                        <td class="py-3 px-4 text-gray-500">${item.hospital}</td>
                        <td class="py-3 px-4 text-gray-600">${item.product}</td>
                        <td class="py-3 px-4 text-center">
                            <span class="${statusClass} text-[11px] px-2.5 py-0.5 rounded-full font-semibold tracking-wide">${item.status}</span>
                        </td>
                        <td class="py-3 px-4 text-gray-500">${formattedDate}</td>
                        <td class="py-3 px-4 text-center">
                            <div class="flex justify-center gap-1.5">
                                <button onclick="viewDetail(${item.id})" class="bg-cyan-500 hover:bg-cyan-600 text-white text-xs px-3 py-1 rounded shadow-sm transition">Lihat</button>
                                <button onclick="openModalEdit(${item.id})" class="bg-orange-500 hover:bg-orange-600 text-white text-xs px-3 py-1 rounded shadow-sm transition">Edit</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // FUNGSI 1: FILTER & RESET
        function applyFilter() {
            const filterStart = document.getElementById('filterStartDate').value;
            const filterEnd = document.getElementById('filterEndDate').value;
            const filterProd = document.getElementById('filterProduct').value;

            filteredData = requestsData.filter(item => {
                let matchDate = true;
                let matchProduct = true;

                if (filterStart) matchDate = matchDate && (item.time >= filterStart);
                if (filterEnd) matchDate = matchDate && (item.time <= filterEnd);
                if (filterProd !== 'Semua Product') matchProduct = (item.product === filterProd);

                return matchDate && matchProduct;
            });

            renderTable(filteredData);
        }

        function resetFilter() {
            document.getElementById('filterStartDate').value = '';
            document.getElementById('filterEndDate').value = '';
            document.getElementById('filterProduct').value = 'Semua Product';
            filteredData = [...requestsData];
            renderTable(filteredData);
        }

        // FUNGSI 2: LIHAT DETAIL
        function viewDetail(id) {
            const item = requestsData.find(r => r.id === id);
            if (!item) return;

            document.getElementById('detailTitle').innerText = item.title;
            document.getElementById('detailProduct').innerText = item.product;
            document.getElementById('detailHospital').innerText = item.hospital;
            document.getElementById('detailContent').innerText = item.content || 'Tidak ada deskripsi konten.';
            
            const dateParts = item.time.split('-');
            document.getElementById('detailTime').innerText = `${parseInt(dateParts[2])}/${parseInt(dateParts[1])}/${dateParts[0]}`;

            const badge = document.getElementById('detailStatus');
            badge.innerText = item.status;
            badge.className = item.status === 'Accepted' 
                ? 'bg-green-100 text-green-600 text-xs px-2.5 py-0.5 rounded font-semibold inline-block mt-1' 
                : 'bg-orange-100 text-orange-600 text-xs px-2.5 py-0.5 rounded font-semibold inline-block mt-1';

            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        // FUNGSI 3: TAMBAH REQUEST
        function openModalAdd() {
            document.getElementById('modalTitle').innerText = "Tambah Request";
            document.getElementById('requestId').value = "";
            document.getElementById('inputProduct').value = "";
            document.getElementById('inputTitle').value = "";
            document.getElementById('inputContent').value = "";
            document.getElementById('formModal').classList.remove('hidden');
        }

        // FUNGSI 4: EDIT REQUEST
        function openModalEdit(id) {
            const item = requestsData.find(r => r.id === id);
            if (!item) return;

            document.getElementById('modalTitle').innerText = "Edit Request";
            document.getElementById('requestId').value = item.id;
            document.getElementById('inputProduct').value = item.product;
            document.getElementById('inputTitle').value = item.title;
            document.getElementById('inputContent').value = item.content;
            
            document.getElementById('formModal').classList.remove('hidden');
        }

        function closeFormModal() {
            document.getElementById('formModal').classList.add('hidden');
        }

        // MEKANISME SIMPAN DATA (CREATE & UPDATE)
        function saveRequest() {
            const id = document.getElementById('requestId').value;
            const product = document.getElementById('inputProduct').value;
            const title = document.getElementById('inputTitle').value;
            const content = document.getElementById('inputContent').value;

            if (!product || !title || !content) {
                alert('Mohon lengkapi semua field bertanda bintang (*)!');
                return;
            }

            if (id) {
                // Skenario Edit (Update Data)
                const index = requestsData.findIndex(r => r.id == id);
                if (index !== -1) {
                    requestsData[index].product = product;
                    requestsData[index].title = title;
                    requestsData[index].content = content;
                }
            } else {
                // Skenario Tambah Baru (Create Data)
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                const formattedToday = `${year}-${month}-${day}`;

                const newRequest = {
                    id: Date.now(), // Unique ID generator sederhana
                    title: title,
                    hospital: "Farmagitechs", // Default instansi pembuat
                    product: product,
                    status: "Waiting",
                    time: formattedToday,
                    content: content
                };
                requestsData.unshift(newRequest); // Tambahkan ke baris paling atas
            }

            closeFormModal();
            resetFilter(); // Refresh tabel dan bersihkan filter filter
        }

        // Inisialisasi awal saat halaman dimuat
        window.onload = function() {
            renderTable(requestsData);
        };
    </script>
</body>
</html>
